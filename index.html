<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>腕立て</title>
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="./icons/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#11100d" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="draw-panel" aria-live="polite">
        <div class="panel-top">
          <div>
            <p class="date" id="todayLabel"></p>
            <h1 class="visually-hidden">腕立て200</h1>
          </div>
          <button class="icon-button" id="resetButton" type="button" aria-label="今日の記録をリセット">
            <svg class="reset-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3v5h5" />
              <path d="M3.4 12a8.6 8.6 0 1 0 2.5-6.1L3 8" />
            </svg>
          </button>
        </div>
        <p class="eyebrow">次の種目</p>
        <div class="current" id="currentExercise">
          <span class="placeholder">まだ引いていません</span>
        </div>
        <div class="menu-status" id="menuStatus">
          <p class="status-heading">あと5種目で完了</p>
          <dl class="status-list">
            <div>
              <dt>残り</dt>
              <dd>肩40、大60、中40、小40、零20</dd>
            </div>
            <div>
              <dt>実施済み</dt>
              <dd>なし</dd>
            </div>
            <div>
              <dt>総回数</dt>
              <dd>0回</dd>
            </div>
          </dl>
        </div>
        <p class="notice" id="drawNotice">サイコロを振る感覚で、次の種目を決めます。</p>
        <button class="primary-button" id="drawButton" type="button">次を引く</button>
      </section>

      <section class="manual-section" aria-label="手動で種目を選ぶ">
        <div class="section-head">
          <h2>手動で選ぶ</h2>
        </div>
        <div class="manual-grid">
          <button class="manual-button manual-shoulder" type="button" data-exercise-id="shoulder">
            <span>肩</span>
            <strong>40回</strong>
          </button>
          <button class="manual-button manual-large" type="button" data-exercise-id="large">
            <span>大</span>
            <strong>60回</strong>
          </button>
          <button class="manual-button manual-middle" type="button" data-exercise-id="middle">
            <span>中</span>
            <strong>40回</strong>
          </button>
          <button class="manual-button manual-small" type="button" data-exercise-id="small">
            <span>小</span>
            <strong>40回</strong>
          </button>
          <button class="manual-button manual-zero" type="button" data-exercise-id="zero">
            <span>零</span>
            <strong>20回</strong>
          </button>
        </div>
      </section>

      <section class="settings" aria-label="抽選設定">
        <label class="setting-row weight-setting">
          <span>
            <strong>出た種目の重み</strong>
            <small id="weightHelp">記録中は変更できません。</small>
          </span>
          <select id="appearedWeight" aria-describedby="weightHelp">
            <option value="0">0%</option>
            <option value="0.1">10%</option>
            <option value="0.3">30%</option>
            <option value="0.5">50%</option>
            <option value="0.6">60%</option>
            <option value="0.8">80%</option>
            <option value="1">100%</option>
          </select>
        </label>
      </section>

      <section class="history-section" aria-label="順番ログ">
        <div class="section-head">
          <h2>順番</h2>
          <button class="text-button" id="copyButton" type="button">コピー</button>
        </div>
        <ol class="history" id="historyList"></ol>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
